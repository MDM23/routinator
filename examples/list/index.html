<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        max-width: 1000px;
        margin: 1rem auto;
      }
     
      main {
        display: grid;
        grid-template-columns: 1fr 3fr;
        gap: 1rem;
      }

      main > ul,section {
        border: 1px solid;
        padding: 1rem;
      }

      ul, h1 {
        margin: 0;
      }
    </style>
  </head>
  <body></body>
</html>
